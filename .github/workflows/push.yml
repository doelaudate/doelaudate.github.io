name: Push-Benachrichtigungen

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

# Läufe nacheinander (kein Doppelversand), neuer Lauf startet wenn der alte endet
concurrency:
  group: push-sender
  cancel-in-progress: false

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Abhängigkeiten installieren
        working-directory: push-sender
        run: npm install --no-audit --no-fund
      - name: Warteschlange abarbeiten (Dauerlauf ~10 Min)
        working-directory: push-sender
        env:
          VAPID_PRIVATE: ${{ secrets.VAPID_PRIVATE }}
          PUSH_BOT_EMAIL: ${{ secrets.PUSH_BOT_EMAIL }}
          PUSH_BOT_PW: ${{ secrets.PUSH_BOT_PW }}
        run: node send-loop.js
