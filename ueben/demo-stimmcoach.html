  SONG.voices.forEach(v=>{ const g=ctx.createGain(); g.connect(master); voiceGain[v.key]=g; });
  updateGains();
}
function anySolo(){ return SONG.voices.some(v=>VC[v.key].solo); }
function effGain(key){
  const v=VC[key]; const solo=anySolo();
  let g = solo ? (v.solo?1:0) : (v.muted?0:1);
  return g * v.vol;
}
function updateGains(){ if(!ctx) return; SONG.voices.forEach(v=>{ voiceGain[v.key].gain.setTargetAtTime(effGain(v.key), ctx.currentTime, 0.02); }); }

function midiToFreq(m){ return 440*Math.pow(2,(m-69)/12); }
// Chor-artiger Klang: Dreieck + leicht verstimmte Sinus
function scheduleNote(key, midi, at, dur){
  const g=voiceGain[key];
  const o1=ctx.createOscillator(), o2=ctx.createOscillator(), ng=ctx.createGain();
  o1.type='triangle'; o1.frequency.value=midiToFreq(midi);
  o2.type='sine'; o2.frequency.value=midiToFreq(midi)*Math.pow(2,7/1200);
  const o2g=ctx.createGain(); o2g.gain.value=0.4; o2.connect(o2g);
  o1.connect(ng); o2g.connect(ng); ng.connect(g);
  const a=0.05, r=0.12, peak=0.5;
  ng.gain.setValueAtTime(0, at);
  ng.gain.linearRampToValueAtTime(peak, at+a);
  ng.gain.setValueAtTime(peak, Math.max(at+a, at+dur-r));
  ng.gain.linearRampToValueAtTime(0, at+dur);
  o1.start(at); o2.start(at); o1.stop(at+dur+0.05); o2.stop(at+dur+0.05);
  scheduled.push(o1,o2);
}
function clearScheduled(){ scheduled.forEach(o=>{try{o.stop();}catch(e){}}); scheduled=[]; }

function play(){
  ensureCtx(); if(ctx.state==='suspended') ctx.resume();
  playing=true; document.getElementById('playBtn').textContent='⏸';
  startCtxTime=ctx.currentTime; // offset bleibt
  const base=startOffset;
  SONG.voices.forEach(v=>{
    v.notes.forEach(n=>{
      const tt=(n.t-base)/tempo;
      if(n.t+ n.d < base) return; // schon vorbei
      const at=startCtxTime+Math.max(0,tt);
      const dur=n.d/tempo - Math.max(0, base-n.t)/tempo;
      if(dur>0.02) scheduleNote(v.key, n.m, at, Math.max(0.05,dur));
    });
  });
  updateGains();
  tick();
}
function pause(){ playing=false; document.getElementById('playBtn').textContent='▶'; if(ctx) startOffset=currentTime(); clearScheduled(); cancelAnimationFrame(rafId); }
function currentTime(){ if(!playing||!ctx) return startOffset; return startOffset+(ctx.currentTime-startCtxTime)*tempo; }
function fmt(s){ s=Math.max(0,s); return Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0'); }
function tick(){
  const t=currentTime();
  document.getElementById('cur').textContent=fmt(t);
  document.getElementById('seek').value=Math.min(1000, (t/DUR)*1000);
  if(t>=DUR){ if(loop){ seekTo(0); } else { pause(); seekTo(0); return; } }
  rafId=requestAnimationFrame(tick);
}
function seekTo(sec){ const was=playing; if(was) pause(); startOffset=Math.max(0,Math.min(DUR,sec)); document.getElementById('cur').textContent=fmt(startOffset); document.getElementById('seek').value=(startOffset/DUR)*1000; if(was) play(); }

// ===== UI =====
function buildMixer(){
  const el=document.getElementById('mix');
  el.innerHTML=SONG.voices.map(v=>`
    <div class="mrow">
      <div class="mbadge" style="background:${v.color}">${v.key}</div>
      <div class="mbtns">
        <button class="mbtn" data-m="${v.key}">M</button>
        <button class="mbtn" data-s="${v.key}">S</button>
      </div>
      <div class="volwrap">
        <input class="vsl" type="range" min="0" max="100" value="85" data-v="${v.key}">
        <span class="vpct" id="pct-${v.key}">85%</span>
      </div>
    </div>`).join('');
  el.querySelectorAll('[data-v]').forEach(s=>s.oninput=e=>{ const k=e.target.dataset.v; VC[k].vol=e.target.value/100; document.getElementById('pct-'+k).textContent=e.target.value+'%'; updateGains(); });
  el.querySelectorAll('[data-m]').forEach(b=>b.onclick=e=>{ const k=e.target.dataset.m; VC[k].muted=!VC[k].muted; e.target.classList.toggle('on-m',VC[k].muted); updateGains(); });
  el.querySelectorAll('[data-s]').forEach(b=>b.onclick=e=>{ const k=e.target.dataset.s; VC[k].solo=!VC[k].solo; e.target.classList.toggle('on-s',VC[k].solo); updateGains(); });
}
buildMixer();
document.getElementById('dur').textContent=fmt(DUR);
document.getElementById('playBtn').onclick=()=>{ playing?pause():play(); };
document.getElementById('backBtn').onclick=()=>seekTo(0);
document.getElementById('loopBtn').onclick=e=>{ loop=!loop; e.target.classList.toggle('on',loop); };
document.getElementById('seek').oninput=e=>{ seekTo((e.target.value/1000)*DUR); };
document.getElementById('tempoSel').onchange=e=>{ const was=playing; if(was)pause(); tempo=parseFloat(e.target.value); if(was)play(); };
</script>
</body>
</html>
